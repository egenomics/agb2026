name: validation_module
description: 'Validate analysis results and compute quality metrics'
keywords:
  - validation
  - quality control
  - verification
input:
  - meta:
      type: value
      description: 'Sample metadata'
  - analysis_results:
      type: file
      description: 'Analysis results to validate'
  - metadata:
      type: file
      description: 'Sample metadata file'
output:
  - validated_results:
      type: file
      description: 'Validated results'
      pattern: "*.validated.tsv"
  - quality_metrics:
      type: file
      description: 'Quality metrics'
      pattern: "*.metrics.json"
  - versions:
      type: file
      description: 'Software versions'
      pattern: "versions.yml"
authors:
  - name: "GROUP C"
    url: "https://github.com"
