name: reporting_module
description: 'Generate reports and visualizations'
keywords:
  - reporting
  - visualization
  - dashboard
input:
  - meta:
      type: value
      description: 'Sample metadata'
  - validated_results:
      type: file
      description: 'Validated results to report'
  - metrics:
      type: file
      description: 'Quality metrics file'
output:
  - html_report:
      type: file
      description: 'HTML report'
      pattern: "*.html"
  - plots:
      type: file
      description: 'Visualization plots'
      pattern: "*.png"
  - versions:
      type: file
      description: 'Software versions'
      pattern: "versions.yml"
authors:
  - name: "GROUP D"
    url: "https://github.com"
