name: MicroSee Report CI

on:
  push:
    branches: [main, Group_D]
    paths:
      - 'modules/groupD/microsee_report/**'
      - '.github/workflows/microsee_report_ci.yml'
  pull_request:
    paths:
      - 'modules/groupD/microsee_report/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          pip install -e "modules/groupD/microsee_report[dev]"
          pip install pytest

      - name: Run tests
        run: |
          pytest modules/groupD/microsee_report/tests/ -v

      - name: Smoke test — generate report with test data
        run: |
          microsee-report \
            --feature-table microsee/microsee_backend/tests/data/feature-table.tsv \
            --taxonomy      microsee/microsee_backend/tests/data/taxonomy.tsv \
            --metadata      microsee/microsee_backend/tests/data/metadata.tsv \
            --alpha         microsee/microsee_backend/tests/data/alpha-diversity.tsv \
            --output        /tmp/microsee_ci_report.html
          test -f /tmp/microsee_ci_report.html
          echo "Report size: $(wc -c < /tmp/microsee_ci_report.html) bytes"
