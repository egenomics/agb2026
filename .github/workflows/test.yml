name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PACKAGE_DIR: modules/groupD/microsee_report

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ env.PACKAGE_DIR }}/pyproject.toml

      - name: Install linting tools
        run: pip install "ruff>=0.4"

      - name: ruff check
        run: ruff check ${{ env.PACKAGE_DIR }}/report_generator/

      - name: ruff format --check
        run: ruff format --check ${{ env.PACKAGE_DIR }}/report_generator/

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ env.PACKAGE_DIR }}/pyproject.toml

      - name: Install package with dev extras
        run: pip install -e "${{ env.PACKAGE_DIR }}[dev]"

      - name: mypy
        run: mypy ${{ env.PACKAGE_DIR }}/report_generator/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: ${{ env.PACKAGE_DIR }}/pyproject.toml

      - name: Install package with dev extras
        run: pip install -e "${{ env.PACKAGE_DIR }}[dev]"

      - name: Run unit tests
        run: pytest ${{ env.PACKAGE_DIR }}/tests/ -v --tb=short

  integration:
    name: Integration (CLI HTML)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ env.PACKAGE_DIR }}/pyproject.toml

      - name: Install package with dev extras
        run: pip install -e "${{ env.PACKAGE_DIR }}[dev]"

      - name: Run CLI integration tests
        run: pytest ${{ env.PACKAGE_DIR }}/tests/ -v --tb=short -m integration

  nextflow:
    name: Nextflow smoke (test,conda)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Nextflow
        run: |
          curl -fsSL https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/

      - name: Run Group D workflow with bundled fixtures
        run: nextflow run workflows/groupD.nf -profile test,conda -ansi-log false

      - name: Verify cohort report published
        run: test -f results/test/microsee_report.html
